<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head}"></head>

<body>
<div th:replace="~{layout/base :: layout(~{::section})}">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Clients</h1>

            <a class="btn btn-primary"
               th:href="@{/admin/clients/nouveau}">
                Nouveau client
            </a>
        </div>
        <table class="table table-striped table-hover table-bordered align-middle">
            <tr>
                <th>Nom</th>
                <th>Email</th>
                <th>Mode de saisie</th>
                <th>Produits accessibles</th>
                <th>Actions</th>
            </tr>
            <tr th:each="client : ${clients}">
                <td th:text="${client.name}"></td>
                <td th:text="${client.email}"></td>
                <td th:text="${client.inputMode == 'ORDER' ? 'Commande' : 'Stock'}"></td>
                <td th:text="${client.accessibleProducts.size()}"></td>
                <td>
                    <div class="d-flex align-items-center gap-1 mb-3">
                        <a class = "btn btn-primary"th:href="@{/admin/clients/{id}/modifier(id=${client.id})}">Modifier</a>
                        <button class="btn btn-danger"
                                data-bs-toggle="modal"
                                data-bs-target="#modalConfirm"
                                th:attr="data-action=@{/admin/clients/{id}/supprimer(id=${client.id})},
                     data-name=${client.name}">
                            Supprimer
                        </button>
                    </div>
                </td>
            </tr>
        </table>

        <!-- Modal -->
        <div class="modal fade" id="modalConfirm" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Confirmer la suppression</h5>
                    </div>
                    <div class="modal-body">
                        <p id="modalMessage"></p>
                    </div>
                    <div class="modal-footer">
                        <form id="modalForm" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                            <button type="submit" class="btn btn-danger">Supprimer</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.getElementById('modalConfirm').addEventListener('show.bs.modal', function(event) {
                const button = event.relatedTarget;
                const action = button.getAttribute('data-action');
                const name = button.getAttribute('data-name');
                document.getElementById('modalMessage').textContent = 'Voulez-vous vraiment supprimer le client ' + name + ' ?';
                document.getElementById('modalForm').action = action;
            });
        </script>

    </section>
</div>
</body>
</html>
