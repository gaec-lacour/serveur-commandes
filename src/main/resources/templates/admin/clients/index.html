<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/base :: layout(~{::section})}">
    <section>
        <h1>Clients</h1>
        <a th:href="@{/admin/clients/nouveau}">Nouveau client</a>

        <table>
            <tr>
                <th>Nom</th>
                <th>Email</th>
                <th>Produits accessibles</th>
                <th>Actions</th>
            </tr>
            <tr th:each="client : ${clients}">
                <td th:text="${client.name}"></td>
                <td th:text="${client.email}"></td>
                <td th:text="${client.accessibleProducts.size()}"></td>
                <td>
                    <a th:href="@{/admin/clients/{id}/modifier(id=${client.id})}">Modifier</a>
                    <form th:action="@{/admin/clients/{id}/supprimer(id=${client.id})}"
                          method="post">
                        <button type="submit">Supprimer</button>
                    </form>
                </td>
            </tr>
        </table>
    </section>
</div>
</body>
</html>
