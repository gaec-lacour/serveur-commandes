<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head}"></head>

<body th:classappend="${draftDirty} ? 'dirty' : ''">
<div th:replace="~{layout/base :: layout(~{::section})}">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Récapitulatif des commandes</h1>

            <form method="get">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox"
                           name="seulementCommandes"
                           value="true"
                           th:checked="${seulementCommandes}"
                           onchange="this.form.submit()"/>
                    <label class="form-check-label">Afficher seulement les produits commandés</label>
                </div>
                <input type="hidden" name="seulementCommandes" value="false"/>
            </form>

            <a class="btn btn-primary btn-export" th:href="@{/admin/commandes/export}">Exporter en Excel</a>
        </div>
        <table class="table table-striped table-hover table-bordered align-middle">
            <thead>
            <tr>
                <th>Produit</th>
                <th th:each="client : ${clients}" th:text="${client.name}"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}"
                th:classappend="${product.category == 'boeuf'} ? 'table-boeuf' : (${product.category == 'veau'} ? 'table-veau' : 'table-porc')">
                <td th:text="${product.name}"></td>

                <td th:each="client : ${clients}">

                    <input th:if="${client.inputMode == 'ORDER'}"
                           type="button"
                           class="btn btn-sm btn-outline-secondary"
                           th:attr="data-user-id=${client.id}, data-product-id=${product.id}"
                           th:value="${quantities[client.id][product.id]} ?: 0"
                           onclick="decrement(this)" />

                    <span th:if="${client.inputMode == 'STOCK'}"
                          th:text="${quantities[client.id][product.id]} ?: '-'">
                    </span>

                </td>
            </tr>
            </tbody>
        </table>

        <script>
                function decrement(btn) {

                let value = parseInt(btn.value || "0", 10);

                value = Math.max(value - 1, 0);

                btn.value = value;
            }
        </script>



        </script>
    </section>
</div>
</body>
</html>
