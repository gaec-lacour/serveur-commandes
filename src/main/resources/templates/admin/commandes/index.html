<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head}"></head>

<body>

<div th:replace="~{layout/base :: layout(~{::section})}">
    <section>

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h1>Récapitulatif des commandes</h1>

            <form method="get">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox"
                           name="seulementCommandes"
                           value="true"
                           th:checked="${seulementCommandes}"
                           onchange="this.form.submit()"/>
                    <label class="form-check-label">
                        Afficher seulement les produits commandés
                    </label>
                </div>
                <input type="hidden" name="seulementCommandes" value="false"/>
            </form>

            <button class="btn btn-primary btn-save" type="button">
                Enregistrer
            </button>

            <button class="btn btn-danger btn-cancel" type="button">
                Annuler
            </button>

            <a class="btn btn-primary btn-export"
               th:href="@{/admin/commandes/export}">
                Exporter en Excel
            </a>

        </div>

        <!-- FORM SAVE GLOBAL -->
        <form id="saveForm" method="post" th:action="@{/admin/commandes}">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <table class="table table-striped table-hover table-bordered align-middle">

                <thead>
                <tr>
                    <th>Produit</th>
                    <th th:each="client, iterStat : ${clients}"
                        th:classappend="${client.inputMode == 'ORDER' and (iterStat.first or clients[iterStat.index - 1].inputMode == 'STOCK')} ? 'separator-col' : ''"
                        th:text="${client.name}">
                    </th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="product : ${products}"
                    th:classappend="${product.category == 'boeuf'} ? 'table-boeuf'
                               : (${product.category == 'veau'} ? 'table-veau' : 'table-porc')">

                    <td th:text="${product.name}"></td>

                    <td th:each="client, iterStat : ${clients}"
                        th:classappend="${client.inputMode == 'ORDER' and (iterStat.first or clients[iterStat.index - 1].inputMode == 'STOCK')} ? 'separator-col' : ''">

                        <input th:if="${client.inputMode == 'ORDER'}"
                               type="button"
                               class="btn btn-sm btn-outline-secondary"
                               th:attr="data-user-id=${client.id}, data-product-id=${product.id}"
                               th:value="${quantities[client.id][product.id]} ?: 0"
                               onclick="decrement(this)" />

                        <span th:if="${client.inputMode == 'STOCK'}"
                              th:text="${quantities[client.id][product.id]} ?: '0'">
                    </span>

                    </td>

                </tr>

                </tbody>

            </table>
        </form>

    </section>
</div>

<script>

    let modified = false;
    let allowExit = false;
    const state = {};

    function key(u, p) {
        return `${u}_${p}`;
    }

    function decrement(el) {

        const userId = el.dataset.userId;
        const productId = el.dataset.productId;

        const form = document.querySelector('form');

        const k = key(userId, productId);

        if (state[k] === undefined) {
            state[k] = parseInt(el.value || "0", 10);
        }

        modified = true;

        state[k] = Math.max(state[k] - 1, 0);
        el.value = state[k];
    }

    document.querySelector('.btn-cancel').addEventListener('click', () => {
        allowExit = true;
        location.reload();
    });

    document.querySelector('.btn-save').addEventListener('click', () => {

        const form = document.getElementById('saveForm');

        if (!form) {
            console.error("saveForm introuvable");
            return;
        }

        // reset ancien state envoyé
        form.querySelectorAll('input[type="hidden"][name^="user_"]').forEach(e => e.remove());

        Object.entries(state).forEach(([k, v]) => {

            const [userId, productId] = k.split('_');

            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = `user_${userId}_product_${productId}`;
            input.value = v;

            form.appendChild(input);
        });
        allowExit = true;
        form.submit();

    });


    window.addEventListener('beforeunload', function(e) {
        if (modified && !allowExit) {
            e.preventDefault();
        }
    });

    document.querySelectorAll('a, button:not(.btn-save):not(.btn-cancel)').forEach(el => {
        el.addEventListener('click', function(e) {
            if (modified) {
                if (!confirm('Vous avez des modifications non enregistrées. Quitter quand même ?')) {
                    e.preventDefault();
                } else {
                    modified = false;
                }
            }
        });
    });

</script>

</body>
</html>
