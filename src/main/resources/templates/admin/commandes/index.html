<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head}"></head>

<body class="admin_page">

<div th:replace="~{layout/base :: layout(~{::section})}">
    <section>

        <div class="d-flex justify-content-between align-items-stretch gap-2 mb-3">
            <h1 class="mb-0">Récapitulatif des commandes</h1>

            <form method="get" class="d-flex align-items-center">
                <div class="form-check mb-0">
                    <input class="form-check-input" type="checkbox"
                           name="seulementCommandes"
                           value="true"
                           th:checked="${seulementCommandes}"
                           onchange="this.form.submit()"/>
                    <label class="form-check-label">
                        Afficher seulement les produits commandés
                    </label>
                </div>
                <input type="hidden" name="seulementCommandes" value="false"/>
            </form>

            <div class="d-flex align-items-center gap-2">

                <form method="post" th:action="@{/admin/commandes/sync}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-warning btn-change" style="height: 59px;"
                            onclick="return confirm('Confirmer la synchronisation ? Toutes les données du tableau seront écrasées')">
                        Synchroniser
                    </button>
                </form>

                <form method="post" th:action="@{/admin/commandes/reset}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-danger btn-change" style="height: 59px;"
                            onclick="return confirm('Confirmer la suppression ? Toutes les données des commandes clients et du tableau récapitulatif seront supprimées')">
                        Remettre à zéro
                    </button>
                </form>

                <button type="submit"
                        form="saveForm"
                        class="btn btn-primary btn-save"
                        style="height: 59px;">
                    Enregistrer
                </button>

                <button class="btn btn-warning btn-cancel"
                        style="height: 59px;">
                    Annuler
                </button>

                <a class="btn btn-primary btn-export"
                   style="height: 59px"
                   th:href="@{/admin/commandes/export}">
                    Exporter en Excel
                </a>

            </div>
        </div>

        <!-- ORDERS LIST -->
        <div th:each="order : ${orders}"
             class="d-flex align-items-center border rounded p-3 mb-2">

    <span th:text="${order.user.name + ' a enregistré une commande le ' +
    #temporals.format(order.date, 'EEEE dd MMMM à HH''h''mm')}"></span>

            <form th:action="@{/admin/commandes/{id}/delete(id=${order.id})}"
                  method="post"
                  class="ms-auto">

                <button type="submit" class="btn btn-sm btn-outline-primary">
                    ×
                </button>

            </form>
        </div>

        <!-- FORM SAVE GLOBAL -->
        <form id="saveForm"
              method="post"
              th:action="@{/admin/commandes}"
              th:object="${orderForm}">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <table class="table table-striped table-hover table-bordered align-middle">

                <thead>
                <tr>
                    <th>Produit</th>

                    <th th:each="client, iterStat : ${clients}"
                        th:classappend="${client.inputMode == 'ORDER'
                        and (iterStat.first
                        or clients[iterStat.index - 1].inputMode == 'STOCK')} ? 'separator-col' : ''">

                        <a th:href="@{/admin/commandes/edit/{id}(id=${client.id})}"
                           th:text="${client.name}">
                        </a>

                    </th>

                </tr>
                </thead>

                <tbody>

                <tr th:each="product, pStat : ${products}"
                    th:classappend="${product.category == 'boeuf'} ? 'table-boeuf'
                   : (${product.category == 'veau'} ? 'table-veau'
                   : 'table-porc')">

                    <td th:text="${product.name}"></td>

                    <td th:each="client, cStat : ${clients}"
                        th:classappend="${client.inputMode == 'ORDER'
                            and (cStat.first
                            or clients[cStat.index - 1].inputMode == 'STOCK')} ? 'separator-col' : ''"
                        th:with="i=${pStat.index * clients.size() + cStat.index}">
                        <!-- ========================= -->
                        <!-- COMMON DATA (TOUJOURS) -->
                        <!-- ========================= -->

                        <input type="hidden"
                               th:name="'items[' + ${i} + '].userId'"
                               th:value="${client.id}" />

                        <input type="hidden"
                               th:name="'items[' + ${i} + '].productId'"
                               th:value="${product.id}" />

                        <input type="hidden"
                               th:name="'items[' + ${i} + '].quantity'"
                               th:value="${quantities[client.id] != null ? quantities[client.id][product.id] : 0}" />

                        <!-- ========================= -->
                        <!-- STOCK MODE (READ ONLY) -->
                        <!-- ========================= -->

                        <div class="d-flex justify-content-between align-items-center">

                    <span th:text="${quantities[client.id] != null ? quantities[client.id][product.id] : 0}">
                    </span>

                            <input th:if="${quantities[client.id] != null
                                    and quantities[client.id][product.id] != 0}"
                                    type="number"
                                   min="0"
                                   class="form-control form-control-sm text-end ms-auto"
                                   style="width:65px;"
                                   th:name="'items[' + ${i} + '].doneQuantity'"
                                   th:value="${doneQuantities[client.id] != null ? doneQuantities[client.id][product.id] : 0}" />

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </form>

    </section>
</div>

<script>

    let modified = false;
    let allowExit = false;


    document.addEventListener('input', (e) => {
        if (e.target && e.target.tagName === 'INPUT' && e.target.type === 'number') {
            modified = true;
        }
    });

    document.querySelector('.btn-cancel').addEventListener('click', () => {
        allowExit = true;
        location.reload();
    });

    document.querySelectorAll('.btn-change').forEach(el => {
        el.addEventListener('click', () => {
            allowExit = true;
        });
    });

    document.querySelectorAll('.btn-save').forEach(el => {
        el.addEventListener('click', () => {
            allowExit = true;
        });
    });

    window.addEventListener('beforeunload', (e) => {
        if (modified && !allowExit) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    document.querySelectorAll('a, button:not(.btn-save):not(.btn-cancel):not(.btn-change)').forEach(el => {
        el.addEventListener('click', function (e) {
            if (!modified) return;

            let message = 'Vous avez des modifications non enregistrées. Quitter quand même ?';

            if (el.classList.contains('btn-export')) {
                message = "Le document n'a pas été enregistré, les données exportées ne seront pas à jour. Exporter quand même ?";
            }

            if (!confirm(message)) {
                e.preventDefault();
            } else {
                allowExit = true;
            }
        });
    });

</script>
<footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
