<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/base :: layout(~{::section})}">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Produits</h1>
            <a class="btn btn-primary" th:href="@{/admin/produits/nouveau}">Nouveau produit</a>
        </div>

        <div th:each="category : ${productsByCategory}">
            <h2 th:text="${category.key}"></h2>
            <table class="table table-striped table-hover table-bordered align-middle">
                <tr>
                    <th>Nom</th>
                    <th>Actions</th>
                </tr>
                <tr th:each="product : ${category.value}">
                    <td th:text="${product.name}"></td>
                    <td>
                        <div class="d-flex align-items-center gap-1">
                            <a class="btn btn-primary" th:href="@{/admin/produits/{id}/modifier(id=${product.id})}">Modifier</a>
                            <button class="btn btn-danger"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalConfirm"
                                    th:attr="data-action=@{/admin/produits/{id}/supprimer(id=${product.id})},data-name=${product.name}">
                                Supprimer
                            </button>
                        </div>
                    </td>
                </tr>
            </table>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="modalConfirm" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Confirmer la suppression</h5>
                    </div>
                    <div class="modal-body">
                        <p id="modalMessage"></p>
                    </div>
                    <div class="modal-footer">
                        <form id="modalForm" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                            <button type="submit" class="btn btn-danger">Supprimer</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.getElementById('modalConfirm').addEventListener('show.bs.modal', function(event) {
                const button = event.relatedTarget;
                document.getElementById('modalMessage').textContent = 'Voulez-vous vraiment supprimer ' + button.getAttribute('data-name') + ' ?';
                document.getElementById('modalForm').action = button.getAttribute('data-action');
            });
        </script>

    </section>
</div>
</body>
</html>
