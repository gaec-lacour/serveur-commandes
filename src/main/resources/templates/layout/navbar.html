<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar">
    <a th:href="@{/}">Accueil</a>

    <!-- Visible uniquement si connecté -->
    <div sec:authorize="isAuthenticated()">

        <!-- Uniquement pour l'admin -->
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/produits}">Produits</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/clients}">Clients</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/commandes}">Commandes</a>

        <a sec:authorize="hasRole('CLIENT')" th:href="@{/commandes}">Commandes</a>
        <!-- Pour tout le monde connecté -->
        <span sec:authentication="name"></span>  <!-- affiche l'email connecté -->

        <form th:action="@{/logout}" method="post">
            <button type="submit">Déconnexion</button>
        </form>
    </div>
</nav>

</body>
</html>
